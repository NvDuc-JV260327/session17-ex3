<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 600px;
            height: 150px;
            position: relative;
            padding: 20px;
            border: 1px solid black;
        }
        .container b {
            display: block;
            font-size: 30px;
            margin-bottom: 20px;
        }
        .container div {
            visibility: hidden;
            width: 60%;
            height: 35%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            line-height: 55px;
            border-radius: 4px;
            background-color: white;
        }
        .container div button {
            position: absolute;
            right: 10px;
            top: 10px;
            background-color: white;
            border: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <b>Modal Example</b>
        <button class="openModal">Open modal</button>
        <div class="modal">
            <span>Some text in the Modal</span>
            <button class="close">x</button>
        </div>
    </div>

    <script src="./ex3.js"></script>
</body>
</html>
